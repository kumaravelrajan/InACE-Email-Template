<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern HTML Email Template</title>
<style type="text/css">
	body {
		margin: 0;
		background-color: #cccccc;
	}
	table {
		border-spacing: 0;
	}
	td {
		padding: 0;
	}
	img {
		border: 0;
	}
	.wrapper{
		width: 100%;
		table-layout: fixed;
		background-color: #cccccc;
		padding-bottom: 60px
	}
	.main{
		background-color: #ffffff;
		margin: 0 auto;
		width: 100%;
		max-width: 600px;
		border-spacing: 0;
		font-family: sans-serif;
		color: #000000;
	}

</style>
</head>
<body>

<center class="wrapper">
	<table class="main">

<!-- TOP BORDER -->
		<tr>
			<td style="height: 10px; background-color: #000000;">
				
			</td>
		</tr>

<!-- LOGO SECTION -->

		<tr class="twoColumns">
			<td class="Column" style="text-align: center; border-bottom: 1px solid #23B0FF;">
				<a href="https://inace.consulting" target="_blank">
					<img src="img/InACE_logo.png" alt="InACE Logo" style="width: 200px; padding: 20px">
				</a>
			</td>
		</tr>

<!-- BANNER IMAGE -->

		<tr>
			<td style="text-align: center;">
				<img src="img/new-year.jpg" alt="Happy New Year" style="width: 100%; max-width: 580px; padding: 10px;">
			</td>
		</tr>

<!-- THREE COLUMN SECTION -->


<!-- TWO COLUMN SECTION -->


<!-- TITLE, TEXT & BUTTON -->


<!-- FOOTER SECTION -->


	</table>
</center>
</body>
</html>
